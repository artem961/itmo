apiVersion: apps/v1
kind: Deployment
metadata:
  name: lab3-backend
  namespace: comp-math
spec:
  replicas: 1
  selector:
    matchLabels:
      app: lab3-backend
  template:
    metadata:
      labels:
        app: lab3-backend
    spec:
      containers:
        - name: lab3-backend-container
          image: artem5252/cm-3-backend:latest
          ports:
            - containerPort: 8080