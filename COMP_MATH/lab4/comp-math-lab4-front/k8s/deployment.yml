apiVersion: apps/v1
kind: Deployment
metadata:
  name: lab4-frontend
  namespace: comp-math
spec:
  replicas: 1
  selector:
    matchLabels:
      app: lab4-frontend
  template:
    metadata:
      labels:
        app: lab4-frontend
    spec:
      containers:
      - name: lab4-frontend-container
        image: artem5252/cm-4-frontend:latest
        ports:
        - containerPort: 3000