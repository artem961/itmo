meta:
  name: "GaussInterpolation"
  description: "Алгоритм вычисления интерполяционного многочлена Гаусса (первая и вторая формулы)"

nodes:
  # --- Слой 0 ---
  start_node:
    type: 5
    layer: 0
    text: "НАЧАЛО"

  # --- Слой 1 ---
  input_data:
    type: 4
    layer: 1
    text: "points, x"

  # --- Слой 2 ---
  check_n:
    type: 2
    layer: 2
    text: "n < 3 OR n % 2 == 0"

  # --- Слой 3 ---
  err_n:
    type: 4
    layer: 3
    order: 1
    text: "Exception: Нужно нечетное количество точек (>= 3)"

  check_eq:
    type: 3
    layer: 3
    order: 2
    text: "checkEquidistant(points)"

  # --- Слой 4 ---
  pre_vars:
    type: 1
    layer: 4
    text: |
      n = points.size
      h = points_{1}.x - points_{0}.x
      centerIdx = n / 2

  # --- Слой 5 ---
  calc_diffs:
    type: 3
    layer: 5
    text: "diffs = calculateFiniteDifferences(points)"

  # --- Слой 6 ---
  init_vars:
    type: 1
    layer: 6
    text: |
      x0 = points_{centerIdx}.x
      t = (x - x0) / h
      res = diffs_{0}_{centerIdx}

  # --- Слой 7 ---
  check_fwd_base:
    type: 2
    layer: 7
    text: "t >= 0"

  # --- Слой 8 ---
  init_fwd:
    type: 1
    layer: 8
    order: 1
    text: |
      useForward = true
      firstDeltaY = diffs_{1}_{centerIdx}

  init_bwd:
    type: 1
    layer: 8
    order: 2
    text: |
      useForward = false
      firstDeltaY = diffs_{1}_{centerIdx - 1}

  # --- Слой 9 ---
  apply_base:
    type: 1
    layer: 9
    text: "res = res + t * firstDeltaY"

  # --- Слой 10 ---
  loop_k:
    type: 6
    layer: 10
    text: "k = 2, n - 1"

  # --- Слой 11 ---
  check_fwd_loop:
    type: 2
    layer: 11
    text: "useForward == true"

  # --- Слой 12 ---
  calc_term_fwd:
    type: 3
    layer: 12
    order: 1
    text: "term = gaussFirstTerm(t, k)"

  calc_term_bwd:
    type: 3
    layer: 12
    order: 2
    text: "term = gaussSecondTerm(t, k)"

  # --- Слой 13 ---
  check_even_fwd:
    type: 2
    layer: 13
    order: 1
    text: "k % 2 == 0"

  check_even_bwd:
    type: 2
    layer: 13
    order: 2
    text: "k % 2 == 0"

  # --- Слой 14 ---
  set_offset_fwd_even:
    type: 1
    layer: 14
    order: 1
    text: "offset = k / 2"

  set_offset_fwd_odd:
    type: 1
    layer: 14
    order: 2
    text: "offset = (k - 1) / 2"

  set_offset_bwd_even:
    type: 1
    layer: 14
    order: 3
    text: "offset = k / 2"

  set_offset_bwd_odd:
    type: 1
    layer: 14
    order: 4
    text: "offset = (k + 1) / 2"

  # --- Слой 15 ---
  calc_deltaY:
    type: 1
    layer: 15
    text: "deltaY = diffs_{k}_{centerIdx - offset}"

  # --- Слой 16 ---
  calc_fact:
    type: 3
    layer: 16
    text: "fact = factorial(k)"

  # --- Слой 17 ---
  apply_term:
    type: 1
    layer: 17
    text: "res = res + (term * deltaY) / fact"

  # --- Слой 18 ---
  out_res:
    type: 4
    layer: 18
    text: "res"

  # --- Слой 19 ---
  end_node:
    type: 5
    layer: 19
    text: "КОНЕЦ"

edges:
  # Инициализация и проверки
  - from: start_node
    to: input_data
  - from: input_data
    to: check_n

  - from: check_n
    to: err_n
    label: "Да"
  - from: check_n
    to: check_eq
    label: "Нет"

  - from: check_eq
    to: pre_vars
  - from: pre_vars
    to: calc_diffs
  - from: calc_diffs
    to: init_vars

  # Выбор формулы Гаусса по t
  - from: init_vars
    to: check_fwd_base
  - from: check_fwd_base
    to: init_fwd
    label: "Да"
  - from: check_fwd_base
    to: init_bwd
    label: "Нет"

  - from: init_fwd
    to: apply_base
  - from: init_bwd
    to: apply_base
  - from: apply_base
    to: loop_k

  # Вход в тело цикла и выбор ветви
  - from: loop_k
    to: check_fwd_loop
  - from: check_fwd_loop
    to: calc_term_fwd
    label: "Да"
  - from: check_fwd_loop
    to: calc_term_bwd
    label: "Нет"

  # Проверка четности k для первой формулы
  - from: calc_term_fwd
    to: check_even_fwd
  - from: check_even_fwd
    to: set_offset_fwd_even
    label: "Да"
  - from: check_even_fwd
    to: set_offset_fwd_odd
    label: "Нет"

  # Проверка четности k для второй формулы
  - from: calc_term_bwd
    to: check_even_bwd
  - from: check_even_bwd
    to: set_offset_bwd_even
    label: "Да"
  - from: check_even_bwd
    to: set_offset_bwd_odd
    label: "Нет"

  # Слияние всех веток расчета offset
  - from: set_offset_fwd_even
    to: calc_deltaY
  - from: set_offset_fwd_odd
    to: calc_deltaY
  - from: set_offset_bwd_even
    to: calc_deltaY
  - from: set_offset_bwd_odd
    to: calc_deltaY

  # Применение слагаемого и факториала
  - from: calc_deltaY
    to: calc_fact
  - from: calc_fact
    to: apply_term

  # Возврат в начало цикла
  - from: apply_term
    to: loop_k

  # Выход из цикла
  - from: loop_k
    to: out_res

  # Финал
  - from: err_n
    to: end_node
  - from: out_res
    to: end_node