meta:
  name: "NewtonInterpolation"
  description: "Алгоритм вычисления интерполяционного многочлена Ньютона (вперед и назад)"

nodes:
  # --- Слой 0 ---
  start_node:
    type: 5
    layer: 0
    text: "НАЧАЛО"

  # --- Слой 1 ---
  input_data:
    type: 4
    layer: 1
    text: "points, x"

  # --- Слой 2 ---
  check_eq:
    type: 3
    layer: 2
    text: "checkEquidistant(points)"

  # --- Слой 3 ---
  pre_vars:
    type: 1
    layer: 3
    text: |
      n = points.size
      h = points_{1}.x - points_{0}.x

  # --- Слой 4 ---
  calc_diffs:
    type: 3
    layer: 4
    text: "diffs = calculateFiniteDifferences(points)"

  # --- Слой 5 ---
  check_fwd:
    type: 2
    layer: 5
    text: "abs(x - points_{0}.x) <= abs(x - points_{n-1}.x)"

  # --- Слой 6 ---
  init_fwd:
    type: 1
    layer: 6
    order: 1
    text: |
      useFwd = true
      tCalc = (x - points_{0}.x) / h
      res = points_{0}.y

  init_bwd:
    type: 1
    layer: 6
    order: 2
    text: |
      useFwd = false
      tCalc = (x - points_{n-1}.x) / h
      res = points_{n-1}.y

  # --- Слой 7 ---
  init_term:
    type: 1
    layer: 7
    text: "termCalc = 1"

  # --- Слой 8 ---
  loop_k:
    type: 6
    layer: 8
    text: "k = 1, n - 1"

  # --- Слой 9 ---
  check_loop_fwd:
    type: 2
    layer: 9
    text: "useFwd == true"

  # --- Слой 10 ---
  loop_fwd_vars:
    type: 1
    layer: 10
    order: 1
    text: |
      delta = tCalc - (k - 1)
      deltaY = diffs_{k}_{0}

  loop_bwd_vars:
    type: 1
    layer: 10
    order: 2
    text: |
      delta = tCalc + (k - 1)
      deltaY = diffs_{k}_{n - 1 - k}

  # --- Слой 11 ---
  calc_fact:
    type: 3
    layer: 11
    text: "fact = factorial(k)"

  # --- Слой 12 ---
  calc_term_res:
    type: 1
    layer: 12
    text: |
      termCalc = termCalc * delta
      res = res + (termCalc * deltaY) / fact

  # --- Слой 13 ---
  out_res:
    type: 4
    layer: 13
    text: "res"

  # --- Слой 14 ---
  end_node:
    type: 5
    layer: 14
    text: "КОНЕЦ"

edges:
  # Инициализация и подготовка данных
  - from: start_node
    to: input_data
  - from: input_data
    to: check_eq
  - from: check_eq
    to: pre_vars
  - from: pre_vars
    to: calc_diffs
  - from: calc_diffs
    to: check_fwd

  # Выбор формулы: вперед или назад
  - from: check_fwd
    to: init_fwd
    label: "Да"
  - from: check_fwd
    to: init_bwd
    label: "Нет"

  - from: init_fwd
    to: init_term
  - from: init_bwd
    to: init_term

  # Вход в тело цикла
  - from: init_term
    to: loop_k
  - from: loop_k
    to: check_loop_fwd

  # Ветвление внутри цикла (шаг многочлена)
  - from: check_loop_fwd
    to: loop_fwd_vars
    label: "Да"
  - from: check_loop_fwd
    to: loop_bwd_vars
    label: "Нет"

  # Слияние логики внутри цикла
  - from: loop_fwd_vars
    to: calc_fact
  - from: loop_bwd_vars
    to: calc_fact
  - from: calc_fact
    to: calc_term_res

  # Возврат в начало цикла
  - from: calc_term_res
    to: loop_k

  # Выход из цикла и завершение
  - from: loop_k
    to: out_res
  - from: out_res
    to: end_node