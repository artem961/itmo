<!DOCTYPE html>
<!--suppress ALL -->
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:p="http://primefaces.org/ui">
<h:head>
    <title>lab3</title>
    <link rel="stylesheet" href="css/colors.css"></link>
    <link rel="stylesheet" href="css/main.css"></link>
</h:head>
<h:body>
    <table class="main-table">
        <tr>
            <td colspan="3">
                <header class="primary-text">
                    <h1>Лабораторная работа №3</h1>
                    <h3>Храбров Артём Алексеевич Р3215</h3>
                    <h3>Вариант 27833</h3>
                </header>
            </td>
        </tr>
        <tr>
            <td class="main-column">
                <div id="main-container">
                    <h:form>

                        <f:metadata>
                            <f:event type="preRenderView" listener="#{clockBean.updateCurrentTime()}" />
                        </f:metadata>
                    <div id="clock-container">
                        <h:outputText id="clock" value="#{clockBean.currentTime}"/>
                    </div>
                        <h:commandButton id="navButton" action="toIndex" value="График"/>
                        <p:poll interval="13" listener="#{clockBean.updateCurrentTime}" update="clock"/>
                    </h:form>
                </div>
            </td>
        </tr>
    </table>
</h:body>
</html>
