<!DOCTYPE html>
<!--suppress ALL -->
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:p="http://primefaces.org/ui">
<h:head>
    <title>lab3</title>
    <link rel="stylesheet" href="css/colors.css"></link>
    <link rel="stylesheet" href="css/main.css"></link>
</h:head>
<h:body>
    <table class="main-table">
        <tr>
            <td colspan="3">
                <header class="primary-text">
                    <h1>Лабораторная работа №3</h1>
                    <h3>Храбров Артём Алексеевич Р3215</h3>
                    <h3>Вариант 27833</h3>
                </header>
            </td>
        </tr>
        <tr>
            <h:form>
                <h:commandButton id="navButton" action="toMain" value="Главная"/>
            </h:form>
        </tr>
        <tr>
            <td class="canvas-column">
                <div id="canvas-container">
                    <canvas id="canvas" width="400" height="400"></canvas>
                </div>
                <h:form id="secretForm" style="display: none">
                    <h:inputText id="x" name="x" value="#{checkHitForCanvasBean.x}"></h:inputText>
                    <h:inputText id="y" name="y" value="#{checkHitForCanvasBean.y}"></h:inputText>
                    <h:inputText id="r" name="r" value="#{checkHitForCanvasBean.RStringList}"></h:inputText>
                    <p:commandButton id="submit"
                                     value="Отправить"
                                     actionListener="#{checkHitForCanvasBean.calcResults()}"
                                     update="tableForm"/>
                </h:form>
            </td>
            <td class="table-column">
                <h:form id="tableForm">
                    <div class="table-wrapper">
                        <p:dataTable value="#{historyBean.getHistory()}" var="result"
                                     rendered="#{not empty historyBean.getHistory()}" id="resultsTable">
                            <p:column headerText="X">
                                <h:outputText value="#{result.x()}"/>
                            </p:column>
                            <p:column headerText="Y">
                                <h:outputText value="#{result.y()}"/>
                            </p:column>
                            <p:column headerText="R">
                                <h:outputText value="#{result.r()}"/>
                            </p:column>
                            <p:column headerText="Результат">
                                <h:outputText value="#{result.result()}"/>
                            </p:column>
                            <p:column headerText="Время выполнения">
                                <h:outputText value="#{result.time()}"/>
                            </p:column>
                            <p:column headerText="Время">
                                <h:outputText value="#{result.currentTime()}"/>
                            </p:column>
                        </p:dataTable>
                    </div>
                    <h:outputScript>
                        function getServerResults(){
                            return #{historyBean.getResultsAsJson()};
                        }
                    </h:outputScript>

                    <h:outputScript>
                        try{
                            setTimeout(updateAll, 100);
                        } catch(e){}
                    </h:outputScript>

                </h:form>
            </td>
            <td class="menu-column">
                <h:form id="menuForm">
                    <div class="menu">
                        <div id="r-container">
                            <div id="r-label" class="label primary-text">R</div>
                            <div id="r-group" class="r-group">

                                <h:outputLabel for="r" value=""/>
                                <p:selectManyCheckbox id="r" value="#{checkHitBean.r}" layout="grid" columns="5"
                                                      required="true"
                                                      requiredMessage="Выберите хотя бы одно значение R">
                                    <f:converter converterId="jakarta.faces.BigDecimal"/>
                                    <f:selectItem itemValue="1.0" itemLabel="1"/>
                                    <f:selectItem itemValue="2.0" itemLabel="2"/>
                                    <f:selectItem itemValue="3.0" itemLabel="3"/>
                                    <f:selectItem itemValue="4.0" itemLabel="4"/>
                                    <f:selectItem itemValue="5.0" itemLabel="5"/>
                                </p:selectManyCheckbox>

                                <h:messages for="r"/>
                            </div>
                        </div>

                        <div id="x-container">
                            <div class="label primary-text">X</div>
                            <div id="x-group" class="x-group primary-text">
                                <h:inputText id="x" value="#{checkHitBean.x}" maxlength="7">
                                    <f:validateDoubleRange minimum="-4" maximum="4"></f:validateDoubleRange>
                                </h:inputText>
                                <h:messages for="x"/>
                                <p:slider for="x" minValue="-4" maxValue="4" step="0.1"/>
                            </div>
                        </div>

                        <div id="y-container">
                            <div class="label primary-text">Y</div>
                            <div id="y-group" class="y-group">
                                <h:inputText id="y" name="y" value="#{checkHitBean.y}" maxlength="7">
                                    <f:validateDoubleRange minimum="-5" maximum="5"></f:validateDoubleRange>
                                </h:inputText>
                                <h:messages for="y"/>
                                <h:outputLabel for="y" value=""/>
                            </div>
                        </div>

                        <div id="b-group" class="b-group">
                            <p:commandButton id="submit"
                                             value="Отправить"
                                             actionListener="#{checkHitBean.calcResults}"
                                             update="tableForm menuForm"/>
                        </div>

                        <h:outputText value="#{checkHitBean.message}"></h:outputText>

                    </div>
                </h:form>
                <h:form>
                    <div class="settings">
                        <p:commandButton id="clear"
                                         value="Очистить"
                                         actionListener="#{historyBean.clearHistory()}"
                                         update="tableForm"/>
                    </div>
                </h:form>

            </td>
        </tr>
    </table>


    <script src="js/tools/ajax/ajax-manager.js"></script>
    <script src="js/tools/table/table-manager.js"></script>
    <script src="js/tools/validation/validator.js"></script>
    <script src="js/tools/graphics.js"></script>
    <script src="js/tools/tooltip.js"></script>
    <script src="js/tools/canvas-controller.js"></script>

    <script src="js/interactiveObjects/interactive-object.js"></script>
    <script src="js/interactiveObjects/grid.js"></script>
    <script src="js/interactiveObjects/axis.js"></script>
    <script src="js/interactiveObjects/point-object.js"></script>
    <script src="js/interactiveObjects/zones/rectangle-zone.js"></script>
    <script src="js/interactiveObjects/zones/sector-zone.js"></script>
    <script src="js/interactiveObjects/zones/triangle-zone.js"></script>
    <script src="js/interactiveObjects/label.js"></script>

    <script src="js/tools/plane.js"></script>
    <script src="js/main.js"></script>
    <script src="js/menu.js"></script>

    <script src="js/updateJSFElements.js"></script>
    <script>updateAll()</script>
</h:body>
</html>
